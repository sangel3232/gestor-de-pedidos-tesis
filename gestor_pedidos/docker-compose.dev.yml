version: "3.9"

# ============================================================
# DOCKER COMPOSE - AMBIENTE DEV
# Uso: docker compose -f docker-compose.dev.yml --env-file .env up -d
# ============================================================

services:

  postgres-dev:
    image: postgres:15-alpine
    container_name: postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-gestor_pedidos_dev}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-dev:
    image: ${DOCKER_REGISTRY:-sangel2022}/gestor-pedidos-backend:${IMAGE_TAG:-latest}
    container_name: backend_dev
    restart: unless-stopped
    depends_on:
      postgres-dev:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE:     dev
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres-dev:5432/${POSTGRES_DB:-gestor_pedidos_dev}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      PAGOS_PROVEEDOR:            MOCK
      CORS_ALLOWED_ORIGINS:       http://3.129.13.116:5174

  frontend-dev:
    image: ${DOCKER_REGISTRY:-sangel2022}/gestor-pedidos-frontend:${IMAGE_TAG:-latest}
    container_name: frontend_dev
    restart: unless-stopped
    ports:
      - "5174:80"
    environment:
      - VITE_API_BASE_URL=http://3.129.13.116:8081
    depends_on:
      - backend-dev

volumes:
  postgres_dev_data:
