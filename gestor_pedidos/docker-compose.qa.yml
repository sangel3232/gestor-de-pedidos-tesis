version: "3.9"

# ============================================================
# DOCKER COMPOSE - AMBIENTE QA
# ============================================================

services:

  postgres-qa:
    image: postgres:15-alpine
    container_name: postgres_qa
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-gestor_pedidos_qa}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
    ports:
      - "5434:5432"
    volumes:
      - postgres_qa_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-qa:
    image: ${DOCKER_REGISTRY:-sangel2022}/gestor-pedidos-backend:${IMAGE_TAG:-latest}
    container_name: backend_qa
    restart: unless-stopped
    depends_on:
      postgres-qa:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE:     qa
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres-qa:5432/${POSTGRES_DB:-gestor_pedidos_qa}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      PAGOS_PROVEEDOR:            MOCK
      CORS_ALLOWED_ORIGINS:       http://18.223.119.161:5175
      TZ:                         America/Bogota
      JAVA_TOOL_OPTIONS:          -Duser.timezone=America/Bogota

  frontend-qa:
    image: ${DOCKER_REGISTRY:-sangel2022}/gestor-pedidos-frontend:${IMAGE_TAG:-latest}
    container_name: frontend_qa
    restart: unless-stopped
    ports:
      - "5175:80"
    depends_on:
      - backend-qa

volumes:
  postgres_qa_data:
