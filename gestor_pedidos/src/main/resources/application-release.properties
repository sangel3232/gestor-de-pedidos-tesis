# ===============================
# PERFIL: RELEASE (produccion)
# ===============================

# Base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - pool mas grande en produccion
spring.datasource.hikari.pool-name=GestorPedidosPool-PROD
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA - sin SQL en produccion
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging minimo en produccion
logging.level.com.sergio.gestor_pedidos=WARN
logging.level.org.hibernate.SQL=ERROR
logging.level.liquibase=WARN
logging.level.root=WARN

# CORS - solo el dominio de produccion
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
