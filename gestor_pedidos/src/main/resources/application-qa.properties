# ===============================
# PERFIL: QA (pruebas / staging)
# ===============================

# Base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.pool-name=GestorPedidosPool-QA
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA - sin mostrar SQL en QA
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging moderado en QA
logging.level.com.sergio.gestor_pedidos=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.liquibase=INFO

# CORS - permite el frontend de QA
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://qa.gestor-pedidos.com}
